<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Pricing Card</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">

  <div class="grid md:grid-cols-3 gap-6 p-6">

    <!-- Card 1 -->
    <div class="bg-white rounded-2xl shadow-lg p-6 text-center hover:scale-105 transition duration-300">
      <h2 class="text-2xl font-bold mb-2">Basic</h2>
      <p class="text-gray-500 mb-4">For Beginners</p>
      <h3 class="text-3xl font-bold mb-6">₹199/mo</h3>
      
      <ul class="text-gray-600 space-y-2 mb-6">
        <li>✔ 5 Projects</li>
        <li>✔ Basic Support</li>
        <li>✖ No AI Tools</li>
      </ul>

      <button class="bg-blue-500 text-white px-6 py-2 rounded-lg hover:bg-blue-600 transition">
        Choose Plan
      </button>
    </div>

    <!-- Card 2 (Popular) -->
    <div class="bg-blue-500 text-white rounded-2xl shadow-xl p-6 text-center scale-105">
      <h2 class="text-2xl font-bold mb-2">Pro</h2>
      <p class="mb-4">Most Popular</p>
      <h3 class="text-3xl font-bold mb-6">₹499/mo</h3>
      
      <ul class="space-y-2 mb-6">
        <li>✔ 15 Projects</li>
        <li>✔ Priority Support</li>
        <li>✔ AI Tools Access</li>
      </ul>

      <button class="bg-white text-blue-500 px-6 py-2 rounded-lg hover:bg-gray-200 transition">
        Choose Plan
      </button>
    </div>

    <!-- Card 3 -->
    <div class="bg-white rounded-2xl shadow-lg p-6 text-center hover:scale-105 transition duration-300">
      <h2 class="text-2xl font-bold mb-2">Premium</h2>
      <p class="text-gray-500 mb-4">For Experts</p>
      <h3 class="text-3xl font-bold mb-6">₹999/mo</h3>
      
      <ul class="text-gray-600 space-y-2 mb-6">
        <li>✔ Unlimited Projects</li>
        <li>✔ 24/7 Support</li>
        <li>✔ All AI Tools</li>
      </ul>

      <button class="bg-blue-500 text-white px-6 py-2 rounded-lg hover:bg-blue-600 transition">
        Choose Plan
      </button>
    </div>

  </div>

</body>
</html>
