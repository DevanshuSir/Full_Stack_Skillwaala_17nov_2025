<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        button{
            background-color: green;
            border: none;
            border-radius: 100%;
            padding: 20px;
            margin: 20px;
        }
    </style>
</head>
<body>
    

    <button id="btn">🫵</button>


    <script>
        let BtnStyled = document.getElementById("btn")
        // console.log(BtnStyled)

        BtnStyled.addEventListener("click",()=>{
            BtnStyled.style.backgroundColor = "red"
        })

        BtnStyled.addEventListener("mouseenter",()=>{
            BtnStyled.textContent = "🛑"
        })

        BtnStyled.addEventListener("mouseleave",()=>{
            BtnStyled.textContent = "🤴"
        })

    </script>

</body>
</html>
