<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link
      rel="stylesheet"
      href="	https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css"
    />

    <style>
        .container{
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: center;
            align-items: center;
            margin-top: 10px;
            margin-bottom: 10px;
           
        }

        /* Point 1 - GitHUb */
    </style>

  </head>
  <body>
    <div class="container" id="product_conatiner"> </div>

    <script>
      async function ProductData() {
        try {
          let response = await fetch("https://dummyjson.com/products");
          let data = await response.json();
          displayProducts(data.products);
        } catch (error) {
          console.log(error);
        }

        function displayProducts(value) {
          let html = "";
          value.forEach((items) => {
            console.log(items);

            html += `
                <div class="card" style="width: 18rem;">
                  <img src=${items.images[0]} class="card-img-top" alt="...">
                <div class="card-body">
                  <h5 class="card-title">${items.title}</h5>
                  <p class="card-text">${items.category
}</p>
                  <a href="#" class="btn btn-primary">${items.price} $</a>
                </div>
                </div>
                `;
          });
          document.getElementById("product_conatiner").innerHTML = html
        }
      }

      ProductData();
    </script>
  </body>
</html>
