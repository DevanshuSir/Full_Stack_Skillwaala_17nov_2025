<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>

    <ul id="titleList"></ul>

    <script>
      fetch("https://fakestoreapi.com/products")
        .then((res) => {
          return res.json();
        })
        .then((data) => {
          let Title = document.getElementById("titleList")
          data.forEach((value)=>{
            let Li = document.createElement("li")
            Li.innerText = value.title
            Title.appendChild(Li)
          })
        })
        .catch((err) => {
          console.log(err);
        });
    </script>
  </body>
</html>
